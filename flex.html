<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cors{
            display: grid;
            grid-template-columns: repeat(5,1fr);
        grid-template-rows: 1fr 1fr 1fr;
        }
        .css{
            padding: 20px;
        }
     .one{
        background-color: red;
        grid-row: 1/3;
     }   
     .two{
        background-color: aqua;
        grid-column: 2/4;

     }
     .three{
        background-color: rgb(220, 198, 27);
        grid-column: 4/6;
     }
     .four{
        background-color: rgb(225, 194, 21);
        grid-column: 2/3;
     }
     .five{
        background-color: aliceblue;
        grid-column:3/-2;
     }
     .six{
        background-color: aliceblue;
        grid-column: 1/2;
        
     }
     .seven{
        background-color: red;
        grid-column: 5/6;
        grid-row: 2/4;
     }
     .eight{
        background-color: red;
        grid-column: 2/4;
     }
     .nine{
        background-color: aqua;
     }
            
        
        
    </style>
</head>
<body>
    <div class="cors">
    <div class="css one"></div>
    <div class="css two"></div>
    <div class=" css three"></div>
    <div class=" css four"></div>
    <div class="css five"></div>
    <div class=" css six"></div>
    <div class=" css seven"></div>
    <div class=" css eight"></div>
    <div class=" css nine"></div>
    </div>
</body>
</html>
